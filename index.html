<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小學中文學習 - 識字與文章</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans CJK TC', 'PingFang TC', 'Microsoft YaHei', sans-serif;
            background: #f0f7f0;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #ffaa66, #ff7a3c);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
        }

        .select-section {
            padding: 18px;
            background: #fef9e6;
            border-bottom: 1px solid #ffe0b5;
        }
        .select-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .select-row label {
            font-weight: 700;
            color: #b45f2b;
            min-width: 55px;
            font-size: 16px;
        }
        .select-row select,
        .select-row input {
            flex: 2;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ffcd94;
            border-radius: 40px;
            background: white;
            font-family: inherit;
        }
        .btn-filter {
            background: #2b7e3a;
            border: none;
            border-radius: 40px;
            padding: 8px 22px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-filter:active {
            transform: scale(0.96);
        }
        .tab-group {
            display: flex;
            gap: 12px;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #cfb284;
            flex: 1;
            text-align: center;
            border: none;
            border-radius: 40px;
            padding: 10px 0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #ff7a3c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .tab-btn:active {
            transform: scale(0.96);
        }
        .practice-card {
            background: white;
            padding: 24px 20px;
            border-radius: 36px;
            margin: 10px 15px 15px 15px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffddb0;
        }
        .word-blank {
            min-height: 90px;
            font-size: 48px;
            font-weight: bold;
            color: #c7362b;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 12px;
            background: #fef2e0;
            border-radius: 32px;
            padding: 20px 10px;
        }
        .meaning-area {
            font-size: 22px;
            background: #fef2e0;
            padding: 14px;
            border-radius: 28px;
            color: #2d4a22;
            margin: 12px 0;
            text-align: center;
            border-left: 4px solid #ffaa66;
            box-shadow: none;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin: 18px 0 12px;
        }
        .btn-grid .btn-icon {
            width: 100%;
            justify-content: center;
            padding: 10px 5px;
            white-space: nowrap;
        }
        .nav-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .nav-btn {
            flex: 1;
            background: #e7e3d4;
            color: #b45f2b;
            border: 1px solid #ffbc7a;
            border-radius: 60px;
            padding: 12px 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            transition: 0.1s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: default;
        }
        .btn-icon {
            background: #ff914d;
            border: none;
            border-radius: 60px;
            padding: 10px 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.1s;
        }
        .btn-icon:active {
            transform: scale(0.96);
        }
        .btn-outline {
            background: #e7e3d4;
            color: #b45f2b;
            border: 1px solid #ffbc7a;
        }
        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #8b6946;
            margin-top: 12px;
        }
        .show-all-btn {
            width: 100%;
            background: #3b7cbf;
            margin-top: 10px;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .article-section {
            background: #fef5e6;
            margin: 10px 15px 20px 15px;
            border-radius: 32px;
            padding: 18px;
            border-top: 3px solid #ffb157;
        }
        .article-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 12px;
            gap: 10px;
        }
        .article-title-display {
            font-size: 18px;
            font-weight: bold;
            color: #b45f2b;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        .article-buttons {
            display: flex;
            gap: 10px;
        }
        .article-content-box {
            background: #fffcf0;
            border-radius: 28px;
            padding: 18px;
            margin-top: 12px;
            margin-bottom: 16px;
            border: 1px solid #ffe0b0;
            font-size: 17px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            color: #2c3a1f;
        }
        .article-nav-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            padding: 15px;
            color: #a0815c;
        }
        .reading-disabled {
            opacity: 0.6;
            cursor: wait;
        }
        /* 選擇題彈窗專用樣式 (保持與原風格一致) */
        .quiz-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 15px;
        }
        .quiz-table th {
            background: #ffcd94;
            padding: 10px 8px;
            text-align: left;
            font-weight: 700;
            color: #2d1f0c;
            border: 1px solid #e0b87a;
        }
        .quiz-table td {
            padding: 10px 8px;
            border: 1px solid #e0b87a;
            vertical-align: middle;
            background: #fffcf0;
        }
        .quiz-table .correct {
            background: #d4edda;
        }
        .quiz-table .wrong {
            background: #f8d7da;
        }
        .quiz-table select {
            padding: 4px 6px;
            border-radius: 20px;
            border: 1px solid #ffcd94;
            background: white;
            font-size: 14px;
            width: 100%;
            max-width: 100px;
        }
        .quiz-stats {
            font-size: 16px;
            color: #b45f2b;
            margin: 8px 0 12px 0;
            font-weight: 600;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .quiz-mode-btn {
            background: #ffaa66;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.1s;
        }
        .quiz-mode-btn:active {
            transform: scale(0.96);
        }
        .quiz-close-btn {
            background: #b0a090;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.1s;
        }
        .quiz-close-btn:active {
            transform: scale(0.96);
        }
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #ffe0b0;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }
        /* 逐題朗讀按鈕 - 不再需要停止樣式 */
        .quiz-speak-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.1s;
        }
        .quiz-speak-btn:hover {
            background: #f0e8d8;
        }
        .quiz-speak-btn:active {
            transform: scale(0.90);
        }
        @media (max-width: 550px) {
            .btn-icon {
                padding: 8px 12px;
                font-size: 13px;
            }
            .meaning-area {
                font-size: 18px;
            }
            .word-blank {
                font-size: 38px;
            }
            .btn-grid {
                gap: 8px;
            }
            .btn-grid .btn-icon {
                white-space: normal;
                font-size: 12px;
            }
            .nav-btn {
                padding: 10px 5px;
                font-size: 14px;
            }
            .quiz-table {
                font-size: 13px;
            }
            .quiz-table th,
            .quiz-table td {
                padding: 6px 4px;
            }
            .quiz-table select {
                font-size: 12px;
                max-width: 70px;
            }
            .quiz-speak-btn {
                font-size: 16px;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📖 小學中文樂園</h1>
        </div>

        <div class="select-section">
            <div class="select-row">
                <label>📁 課本：</label>
                <select id="fileSelect">
                    <option value="">-- 請選擇單元 --</option>
                </select>
            </div>
            <div class="select-row" id="dayFilterRow" style="display: none;">
                <label>📅 課次：</label>
                <select id="daySelect">
                    <option value="all">全部課次</option>
                    <option value="custom">自訂課次</option>
                </select>
                <input type="number" id="customDayNum" value="1" min="1" step="1" style="flex:1; min-width:70px;" disabled>
                <button id="filterDayBtn" class="btn-filter">🔍 篩選</button>
            </div>
            <div class="tab-group">
                <button class="tab-btn active" data-tab="must">📝 必懂寫生字</button>
                <button class="tab-btn" data-tab="only">👀 只需記認生字</button>
                <button class="tab-btn" data-tab="article">📖 文章閱讀</button>
            </div>
        </div>

        <div id="wordPanel" style="display: block;">
            <div class="practice-card">
                <div class="word-blank" id="wordDisplayArea"></div>
                <div class="meaning-area" id="meaningArea">💡 解釋將會顯示在這裡</div>
                <div class="btn-grid">
                    <button id="toggleWordBtn" class="btn-icon">👁️ 顯示生字</button>
                    <button id="readWordThreeBtn" class="btn-icon">🔊 生字x3</button>
                    <button id="readMeaningBtn" class="btn-icon">🗣️ 解釋x1</button>
                </div>
                <div class="nav-row">
                    <button id="prevWordBtn" class="nav-btn">⬅️ 上一個</button>
                    <button id="nextWordBtn" class="nav-btn">➡️ 下一個</button>
                </div>
                <div class="progress-text" id="wordProgress"></div>
                <button id="showAllWordsBtn" class="show-all-btn">📋 顯示所有生字</button>
            </div>
        </div>

        <div id="articlePanel" style="display: none;">
            <div class="article-section">
                <div class="article-header">
                    <span id="articleTitleDisplay" class="article-title-display">請選擇文章</span>
                    <div class="article-buttons">
                        <button id="readArticleBtn" class="btn-icon">🔊 朗讀</button>
                        <button id="toggleArticleBtn" class="btn-icon">🙈 隱藏文章</button>
                    </div>
                </div>
                <div id="articleContentBox" class="article-content-box">
                    請選擇文章
                </div>
                <div class="article-nav-footer">
                    <button id="prevArticleBtn" class="btn-icon btn-outline" style="padding: 6px 20px;">⬅️ 上一篇</button>
                    <button id="nextArticleBtn" class="btn-icon btn-outline" style="padding: 6px 20px;">下一篇 ➡️</button>
                </div>
            </div>
        </div>
        <div class="footer">
            🌟 所有發音皆為粵語 | 自選課次學習 | 生字預設隱藏
        </div>
    </div>

    <script>
        // ---------- 全域變數 ----------
        let allMustWords = [];
        let allOnlyWords = [];
        let articles = [];

        let currentWordSet = "must";
        let currentFilteredWords = [];
        let currentWordIndex = 0;
        let currentFileName = "";

        let isWordVisible = false;

        let currentArticleIndex = 0;
        let isArticleHidden = false;

        // 粵語語音引擎
        let synth = window.speechSynthesis;
        let cantoneseVoice = null;
        let cantoneseVoiceEngineReady = false;

        // 朗讀狀態管理 (簡化版，不再需要 currentCantoneseButton)
        let isCantoneseReading = false;

        // 選擇題逐題朗讀狀態管理
        let quizItemReadingIndex = null; // 當前朗讀的題目索引

        // ---------- 語音引擎 ----------
        function getCantoneseVoice() {
            const voices = synth.getVoices();
            if (!voices || voices.length === 0) return null;
            return voices.find(v => v.name && v.name === 'Sin-Ji') ||
                voices.find(v => v.name && v.name.includes('Google') && (v.lang === 'yue' || v.lang === 'zh-HK')) ||
                voices.find(v => v.name && v.name.includes('Cantonese')) ||
                voices.find(v => v.lang === 'yue') ||
                voices.find(v => v.lang === 'zh-HK') ||
                voices.find(v => v.lang && v.lang.includes('hk')) ||
                null;
        }

        function ensureCantoneseEngine(callback) {
            if (cantoneseVoiceEngineReady && cantoneseVoice) {
                if (callback) callback();
                return true;
            }
            try {
                const silent = new SpeechSynthesisUtterance('');
                silent.volume = 0;
                const voice = getCantoneseVoice();
                if (voice) {
                    cantoneseVoice = voice;
                    silent.voice = voice;
                }
                silent.onend = () => {
                    cantoneseVoiceEngineReady = true;
                    if (callback) callback();
                };
                synth.speak(silent);
                setTimeout(() => {
                    if (!cantoneseVoiceEngineReady) {
                        cantoneseVoiceEngineReady = true;
                        if (callback) callback();
                    }
                }, 500);
            } catch (e) {
                cantoneseVoiceEngineReady = true;
                if (callback) callback();
            }
            return false;
        }

        function speakCantoneseOnce(text, onEnd) {
            if (!text || !text.trim()) {
                if (onEnd) onEnd();
                return;
            }

            try { synth.cancel(); } catch (e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "yue";
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            utterance.volume = 1;

            const voice = getCantoneseVoice();
            if (voice) {
                utterance.voice = voice;
                cantoneseVoice = voice;
            }

            let ended = false;

            utterance.onend = () => {
                if (!ended) {
                    ended = true;
                    if (onEnd) onEnd();
                }
            };

            utterance.onerror = () => {
                if (!ended) {
                    ended = true;
                    if (onEnd) onEnd();
                }
            };

            try {
                synth.speak(utterance);
                // 移除安全計時器，完全依賴 onend 事件
            } catch (e) {
                if (onEnd) onEnd();
            }
        }


        // ---------- 【核心】單句朗讀（分段循序朗讀） ----------
        // 朗讀單一題目 (分段：題號+解釋 → 選項A → 選項B → 選項C)
        // 全部讀完後才觸發 onEnd
        function speakSingleQuizItem(index, explanation, optA, optB, optC, onEnd) {
            const parts = [
                `題號${index + 1}。${explanation}`,
                `選項A：${optA}`,
                `選項B：${optB}`,
                `選項C：${optC}`
            ];

            let currentIndex = 0;

            function speakNext() {
                if (currentIndex >= parts.length) {
                    if (onEnd) onEnd();
                    return;
                }
                speakCantoneseOnce(parts[currentIndex], () => {
                    currentIndex++;
                    speakNext();
                });
            }

            speakNext();
        }

        // ---------- 共用停止函數 (簡化版) ----------
        function stopAllSpeech() {
            if (isCantoneseReading) {
                try { synth.cancel(); } catch (e) {}
                isCantoneseReading = false;
            }
            // 重置逐題朗讀狀態
            quizItemReadingIndex = null;
        }

        setTimeout(() => {
            ensureCantoneseEngine(() => { console.log('粵語語音引擎已就緒'); });
        }, 1000);

        // ---------- 讀取 Excel ----------
        const BASE_URL = window.location.href.includes('github.io') ?
            window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') :
            './';
        const DATA_PATH = `${BASE_URL}data/chinese/`;

        async function loadFileList() {
            try {
                const listUrl = `${DATA_PATH}fileList.json`;
                const res = await fetch(listUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                const files = json.files || [];
                const fileSelect = document.getElementById('fileSelect');
                fileSelect.innerHTML = '<option value="">-- 請選擇單元 --</option>';
                files.forEach(f => {
                    const option = document.createElement('option');
                    option.value = f;
                    option.textContent = f.replace(/\.xlsx$/i, '');
                    fileSelect.appendChild(option);
                });
                if (files.length > 0) fileSelect.disabled = false;
            } catch (e) {
                console.warn("無法讀取 fileList.json", e);
                document.getElementById('fileSelect').innerHTML = '<option value="">無法載入清單</option>';
            }
        }

        async function loadExcelFile(filename) {
            if (!filename) return false;
            currentFileName = filename;
            const url = `${DATA_PATH}${filename}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`下載失敗 ${resp.status}`);
                const ab = await resp.arrayBuffer();
                const wb = XLSX.read(ab, { type: 'array' });
                const sheet1 = wb.Sheets["必懂寫"];
                if (sheet1) {
                    const rows = XLSX.utils.sheet_to_json(sheet1);
                    allMustWords = rows.map(row => ({
                        character: String(row["生字"] || "").trim(),
                        explanation: String(row["解釋"] || "").trim(),
                        example: String(row["例句"] || "").trim(),
                        day: row["日期"] !== undefined ? String(row["日期"]).trim() : ""
                    })).filter(w => w.character);
                } else allMustWords = [];
                const sheet2 = wb.Sheets["只需記認"];
                if (sheet2) {
                    const rows = XLSX.utils.sheet_to_json(sheet2);
                    allOnlyWords = rows.map(row => ({
                        character: String(row["生字"] || "").trim(),
                        explanation: String(row["解釋"] || "").trim(),
                        example: String(row["例句"] || "").trim(),
                        day: row["日期"] !== undefined ? String(row["日期"]).trim() : ""
                    })).filter(w => w.character);
                } else allOnlyWords = [];
                const sheet3 = wb.Sheets["文章"];
                if (sheet3) {
                    const rows = XLSX.utils.sheet_to_json(sheet3);
                    articles = rows.map(row => ({
                        title: String(row["標題"] || row["标题"] || "無題").trim(),
                        content: String(row["文章"] || row["内容"] || "").trim()
                    })).filter(a => a.title && a.content);
                } else articles = [];

                if (currentWordSet === "must") refreshWordList("must");
                else if (currentWordSet === "only") refreshWordList("only");

                if (articles.length > 0) {
                    currentArticleIndex = 0;
                    updateArticleNavButtons();
                    showArticle(0);
                } else {
                    document.getElementById("articleContentBox").innerHTML = "📭 沒有文章資料";
                    document.getElementById("articleTitleDisplay").textContent = "無文章";
                    updateArticleNavButtons();
                }

                document.getElementById("dayFilterRow").style.display = "flex";
                return true;
            } catch (err) {
                console.error(err);
                alert("載入失敗，請確認 Excel 檔案格式及路徑正確");
                return false;
            }
        }

        function refreshWordList(setType) {
            currentWordSet = setType;
            const sourceWords = (setType === "must") ? allMustWords : allOnlyWords;
            const daySelect = document.getElementById("daySelect");
            const customNum = document.getElementById("customDayNum");
            let filterValue = daySelect.value;
            let dayFilter = null;
            if (filterValue === "custom") {
                let val = customNum.value.trim();
                if (val && !isNaN(Number(val))) dayFilter = String(Number(val));
            }
            if (filterValue === "all" || !dayFilter) {
                currentFilteredWords = [...sourceWords];
            } else {
                currentFilteredWords = sourceWords.filter(w => String(w.day) === dayFilter);
            }
            currentWordIndex = 0;
            isWordVisible = false;
            if (currentFilteredWords.length === 0) {
                document.getElementById("wordDisplayArea").innerHTML = "📭 沒有符合的生字";
                document.getElementById("meaningArea").innerHTML = "💡 嘗試調整課次篩選";
                document.getElementById("wordProgress").innerText = "0 / 0";
                document.getElementById("toggleWordBtn").textContent = "👁️ 顯示生字";
                return;
            }
            renderCurrentWord();
        }

        function renderCurrentWord() {
            if (!currentFilteredWords.length) {
                document.getElementById("wordDisplayArea").innerHTML = "✨ 暫無生字 ✨";
                document.getElementById("meaningArea").innerHTML = "💡 請選擇檔案或調整篩選";
                document.getElementById("wordProgress").innerText = "0 / 0";
                return;
            }
            const w = currentFilteredWords[currentWordIndex];
            if (!w) return;
            document.getElementById("meaningArea").innerHTML = `📖 ${w.explanation || "（無解釋）"}`;
            const wordDiv = document.getElementById("wordDisplayArea");
            if (isWordVisible) {
                wordDiv.innerHTML = `<span style="font-size:50px;">${w.character}</span>`;
                document.getElementById("toggleWordBtn").textContent = "🙈 隱藏生字";
            } else {
                wordDiv.innerHTML = ``;
                document.getElementById("toggleWordBtn").textContent = "👁️ 顯示生字";
            }
            const total = currentFilteredWords.length;
            document.getElementById("wordProgress").innerHTML =
                `📌 第 ${currentWordIndex+1} / ${total} 字 &nbsp;| 課次: ${w.day || "—"}`;
            document.getElementById("prevWordBtn").disabled = (currentWordIndex === 0);
            document.getElementById("nextWordBtn").disabled = (currentWordIndex === total - 1);
        }

        function switchWordSet(set) {
            currentWordSet = set;
            refreshWordList(set);
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (set === 'must') document.querySelector('[data-tab="must"]').classList.add('active');
            else if (set === 'only') document.querySelector('[data-tab="only"]').classList.add('active');
            document.getElementById("wordPanel").style.display = "block";
            document.getElementById("articlePanel").style.display = "none";
            stopAllSpeech();
        }

        function updateArticleNavButtons() {
            const prevBtn = document.getElementById("prevArticleBtn");
            const nextBtn = document.getElementById("nextArticleBtn");
            if (articles.length === 0) {
                if (prevBtn) prevBtn.disabled = true;
                if (nextBtn) nextBtn.disabled = true;
                return;
            }
            if (prevBtn) prevBtn.disabled = (currentArticleIndex === 0);
            if (nextBtn) nextBtn.disabled = (currentArticleIndex === articles.length - 1);
        }

        function showArticle(index) {
            if (!articles.length) return;
            if (index < 0) index = 0;
            if (index >= articles.length) index = articles.length - 1;
            currentArticleIndex = index;
            const art = articles[currentArticleIndex];
            document.getElementById("articleTitleDisplay").textContent = art.title;
            const contentDiv = document.getElementById("articleContentBox");
            if (!isArticleHidden) {
                contentDiv.style.whiteSpace = "pre-wrap";
                contentDiv.innerHTML = art.content.replace(/\n/g, '<br>');
            } else {
                contentDiv.innerHTML = "<em>📖 文章已隱藏，點擊「顯示文章」</em>";
            }
            updateArticleNavButtons();
        }

        function prevArticle() {
            if (articles.length > 0 && currentArticleIndex > 0) {
                currentArticleIndex--;
                showArticle(currentArticleIndex);
                stopAllSpeech();
                const contentDiv = document.getElementById("articleContentBox");
                if (isArticleHidden) {
                    contentDiv.innerHTML = "<em>📖 文章已隱藏，點擊「顯示文章」</em>";
                } else {
                    const art = articles[currentArticleIndex];
                    contentDiv.style.whiteSpace = "pre-wrap";
                    contentDiv.innerHTML = art.content.replace(/\n/g, '<br>');
                }
            }
        }

        function nextArticle() {
            if (articles.length > 0 && currentArticleIndex < articles.length - 1) {
                currentArticleIndex++;
                showArticle(currentArticleIndex);
                stopAllSpeech();
                const contentDiv = document.getElementById("articleContentBox");
                if (isArticleHidden) {
                    contentDiv.innerHTML = "<em>📖 文章已隱藏，點擊「顯示文章」</em>";
                } else {
                    const art = articles[currentArticleIndex];
                    contentDiv.style.whiteSpace = "pre-wrap";
                    contentDiv.innerHTML = art.content.replace(/\n/g, '<br>');
                }
            }
        }

        function toggleArticleVisibility() {
            const btn = document.getElementById("toggleArticleBtn");
            isArticleHidden = !isArticleHidden;
            const art = articles[currentArticleIndex];
            const contentDiv = document.getElementById("articleContentBox");
            if (isArticleHidden) {
                contentDiv.innerHTML = "<em>📖 文章已隱藏，點擊「顯示文章」</em>";
                btn.textContent = "🙉 顯示文章";
            } else {
                if (art) {
                    contentDiv.style.whiteSpace = "pre-wrap";
                    contentDiv.innerHTML = art.content.replace(/\n/g, '<br>');
                } else {
                    contentDiv.innerHTML = "無內容";
                }
                btn.textContent = "🙈 隱藏文章";
            }
        }

        function readArticleOnce() {
            if (!articles.length) return;
            const art = articles[currentArticleIndex];
            if (!art.content) return;
            const button = document.getElementById("readArticleBtn");
            // 使用 speakCantoneseOnce 朗讀文章
            if (isCantoneseReading && currentCantoneseButton === button) {
                stopAllSpeech();
                return;
            }
            stopAllSpeech();
            currentCantoneseButton = button;
            button.textContent = "⏹️ 停止";
            button.classList.add('reading-disabled');
            isCantoneseReading = true;
            ensureCantoneseEngine(() => {
                speakCantoneseOnce(art.content, () => {
                    button.textContent = "🔊 朗讀";
                    button.classList.remove('reading-disabled');
                    isCantoneseReading = false;
                    currentCantoneseButton = null;
                });
            });
        }

        // ====================== 【核心】選擇題模式 ======================
        let currentQuizData = null;
        let currentQuizMode = 'list';

        // 生成選擇題資料 (每次重新生成)
        function generateQuizData(wordList) {
            if (!wordList || wordList.length === 0) return null;
            const quizItems = [];
            const total = wordList.length;
            const allChars = wordList.map(w => w.character);

            for (let i = 0; i < total; i++) {
                const correct = wordList[i];
                let distractors = [];
                const candidates = allChars.filter(ch => ch !== correct.character);
                if (candidates.length < 2) {
                    while (distractors.length < 2) {
                        distractors.push(candidates.length > 0 ? candidates[0] : correct.character);
                    }
                } else {
                    const shuffled = [...candidates].sort(() => Math.random() - 0.5);
                    distractors = shuffled.slice(0, 2);
                }

                const options = [
                    { text: correct.character, isCorrect: true },
                    { text: distractors[0], isCorrect: false },
                    { text: distractors[1], isCorrect: false }
                ];
                const shuffledOptions = options.sort(() => Math.random() - 0.5);
                let correctLetter = '';
                const letters = ['A', 'B', 'C'];
                for (let idx = 0; idx < shuffledOptions.length; idx++) {
                    if (shuffledOptions[idx].isCorrect) {
                        correctLetter = letters[idx];
                        break;
                    }
                }

                quizItems.push({
                    index: i,
                    explanation: correct.explanation || '',
                    correctChar: correct.character,
                    correctLetter: correctLetter,
                    options: shuffledOptions.map((opt, idx) => ({
                        letter: letters[idx],
                        text: opt.text,
                        isCorrect: opt.isCorrect
                    })),
                    userAnswer: null,
                    isAnswered: false
                });
            }
            return quizItems;
        }

        // ---------- 【核心】逐題朗讀（無停止鍵版本） ----------
        function toggleSingleQuizReading(index, buttonElement) {
            if (!currentQuizData || index >= currentQuizData.length) return;

            // 如果該題正在朗讀 → 忽略本次點擊
            if (quizItemReadingIndex === index && isCantoneseReading) {
                return;
            }

            // 如果有其他朗讀正在進行，先停止
            if (isCantoneseReading) {
                stopAllSpeech();
            }

            const item = currentQuizData[index];
            const optA = item.options.find(o => o.letter === 'A');
            const optB = item.options.find(o => o.letter === 'B');
            const optC = item.options.find(o => o.letter === 'C');

            quizItemReadingIndex = index;
            isCantoneseReading = true;

            speakSingleQuizItem(
                index,
                item.explanation,
                optA ? optA.text : '',
                optB ? optB.text : '',
                optC ? optC.text : '',
                () => {
                    quizItemReadingIndex = null;
                    isCantoneseReading = false;
                }
            );
        }

        // 渲染選擇題表格
        function renderQuizTable(quizItems, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (!quizItems || quizItems.length === 0) {
                container.innerHTML = '<p style="color:#b45f2b; text-align:center; padding:20px;">⚠️ 沒有生字資料，無法生成選擇題。</p>';
                return;
            }

            let total = quizItems.length;
            let answered = quizItems.filter(item => item.isAnswered).length;
            let correctCount = quizItems.filter(item => item.isAnswered && item.userAnswer === item.correctLetter).length;
            let accuracy = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;

            let html = `
                    <div class="quiz-stats">
                        <span>📊 總題數：${total}</span>
                        <span>✅ 已答：${answered}</span>
                        <span>🎯 正確率：${accuracy}%</span>
                    </div>
                    <table class="quiz-table">
                        <thead>
                            <tr>
                                <th style="width:45px;">題號</th>
                                <th>解釋</th>
                                <th style="width:75px;">選項 A</th>
                                <th style="width:75px;">選項 B</th>
                                <th style="width:75px;">選項 C</th>
                                <th style="width:105px;">你的答案</th>
                                <th style="width:80px;">結果</th>
                                <th style="width:45px;">朗讀</th>
                            </tr>
                        </thead>
                        <tbody>
                    `;

            for (let i = 0; i < quizItems.length; i++) {
                const item = quizItems[i];
                const options = item.options;
                const optionA = options.find(o => o.letter === 'A');
                const optionB = options.find(o => o.letter === 'B');
                const optionC = options.find(o => o.letter === 'C');

                let rowClass = '';
                let resultDisplay = '';
                if (item.isAnswered) {
                    const isCorrect = item.userAnswer === item.correctLetter;
                    if (isCorrect) {
                        rowClass = 'correct';
                        resultDisplay = '✅';
                    } else {
                        rowClass = 'wrong';
                        resultDisplay = `❌ (${item.correctLetter})`;
                    }
                }

                html += `
                        <tr class="${rowClass}" data-index="${i}">
                            <td style="text-align:center; font-weight:bold;">${i + 1}</td>
                            <td>${item.explanation}</td>
                            <td>${optionA ? optionA.text : ''}</td>
                            <td>${optionB ? optionB.text : ''}</td>
                            <td>${optionC ? optionC.text : ''}</td>
                            <td>
                                <select class="quiz-select" data-index="${i}">
                                    <option value="">請揀選</option>
                                    <option value="A" ${item.userAnswer === 'A' ? 'selected' : ''}>A</option>
                                    <option value="B" ${item.userAnswer === 'B' ? 'selected' : ''}>B</option>
                                    <option value="C" ${item.userAnswer === 'C' ? 'selected' : ''}>C</option>
                                </select>
                            </td>
                            <td style="text-align:center; font-weight:bold;">${resultDisplay}</td>
                            <td style="text-align:center;">
                                <button class="quiz-speak-btn" data-index="${i}">🔊</button>
                            </td>
                        </tr>
                    `;
            }

            html += `
                        </tbody>
                    </table>
                `;

            container.innerHTML = html;

            // 綁定下拉選單事件
            document.querySelectorAll('.quiz-select').forEach(select => {
                select.addEventListener('change', function(e) {
                    const idx = parseInt(this.dataset.index, 10);
                    const val = this.value;
                    if (!val) return;
                    if (currentQuizData && currentQuizData[idx]) {
                        currentQuizData[idx].userAnswer = val;
                        currentQuizData[idx].isAnswered = true;
                    }
                    renderQuizTable(currentQuizData, 'quizContainer');
                    // 重新綁定逐題按鈕事件
                    document.querySelectorAll('.quiz-speak-btn').forEach(btn => {
                        const idx = parseInt(btn.dataset.index, 10);
                        btn.onclick = function() {
                            toggleSingleQuizReading(idx, this);
                        };
                    });
                });
            });

            // 綁定逐題按鈕事件
            document.querySelectorAll('.quiz-speak-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.index, 10);
                btn.onclick = function() {
                    toggleSingleQuizReading(idx, this);
                };
            });
        }

        // 切換模式：列表 ↔ 選擇題
        function switchQuizMode(mode) {
            if (!currentQuizData) return;
            currentQuizMode = mode;
            const container = document.getElementById('quizContainer');
            const listContainer = document.getElementById('wordListContainer');
            const quizTitle = document.getElementById('quizTitle');
            const modeToggleBtn = document.getElementById('modeToggleBtn');
            const modeToggleFooterBtn = document.getElementById('modeToggleFooterBtn');

            if (mode === 'list') {
                listContainer.style.display = 'block';
                container.style.display = 'none';
                if (quizTitle) quizTitle.textContent = '📚 生字列表';
                if (modeToggleBtn) {
                    modeToggleBtn.textContent = '📝 選擇題';
                    modeToggleBtn.onclick = () => switchQuizMode('quiz');
                }
                if (modeToggleFooterBtn) {
                    modeToggleFooterBtn.textContent = '📝 選擇題';
                    modeToggleFooterBtn.onclick = () => switchQuizMode('quiz');
                }
                // 停止所有朗讀
                stopAllSpeech();
            } else {
                listContainer.style.display = 'none';
                container.style.display = 'block';
                if (quizTitle) quizTitle.textContent = '📝 選擇題練習';
                if (modeToggleBtn) {
                    modeToggleBtn.textContent = '📋 返回列表';
                    modeToggleBtn.onclick = () => switchQuizMode('list');
                }
                if (modeToggleFooterBtn) {
                    modeToggleFooterBtn.textContent = '📋 返回列表';
                    modeToggleFooterBtn.onclick = () => switchQuizMode('list');
                }
                // 重新生成選擇題
                const source = (currentWordSet === "must") ? allMustWords : allOnlyWords;
                const daySelect = document.getElementById('daySelect');
                const customNum = document.getElementById('customDayNum');
                let dayFilter = null;
                if (daySelect.value === 'custom') {
                    let val = customNum.value.trim();
                    if (val && !isNaN(Number(val))) dayFilter = String(Number(val));
                }
                let filteredSource = [];
                if (daySelect.value === 'all' || !dayFilter) {
                    filteredSource = [...source];
                } else {
                    filteredSource = source.filter(w => String(w.day) === dayFilter);
                }
                currentQuizData = generateQuizData(filteredSource);
                renderQuizTable(currentQuizData, 'quizContainer');
                // 停止所有朗讀
                stopAllSpeech();
            }
        }

        // ====================== 顯示所有生字彈窗 (整合選擇題與單句朗讀) ======================
        function showAllWordsPopup() {

            }
            let filteredSource = [];
            if (daySelect.value === 'all' || !dayFilter) {
                filteredSource = [...source];
            } else {
                filteredSource = source.filter(w => String(w.day) === dayFilter);

            // 建立生字列表 HTML

            tableHtml += `</tbody></table>`;

            // 建立完整彈窗 HTML
            const popupHtml = `

                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>${setTitle}</title>
                    <style>

                        .word-list-container td { padding: 8px; border: 1px solid #e0b87a; background: #fffcf0; }

                    </style>
                </head>
                <body>
                    <div class="popup-container">
                        <div class="popup-header">
                            <div>
                                <h2 id="quizTitle">📚 生字列表</h2>
                                <div style="font-size:14px; color:#8b6946; margin-top:4px;">共 ${filteredSource.length} 字</div>
                            </div>

                                <button id="modeToggleBtn" class="btn-toggle">📝 選擇題</button>

                            ${tableHtml}
                        </div>
                        <div id="quizContainer" style="display:none;"></div>
                        <div class="quiz-footer">
                            <button id="modeToggleFooterBtn" class="btn-toggle">📝 選擇題</button>
                            <button class="btn-close" onclick="window.close()">❌ 關閉</button>
                        </div>
                    </div>
                    <script>
                        // 傳遞資料到彈窗
                        window.quizData = ${JSON.stringify(currentQuizData)};
                        window.currentWordSet = "${currentWordSet}";
                        window.allMustWords = ${JSON.stringify(allMustWords)};
                        window.allOnlyWords = ${JSON.stringify(allOnlyWords)};
                        window.currentFilteredSource = ${JSON.stringify(filteredSource)};

                        // 複製父頁面的核心函數 (簡化版，無停止鍵)
                        function getCantoneseVoice() {
                            const voices = window.speechSynthesis.getVoices();
                            if (!voices || voices.length === 0) return null;
                            return voices.find(v => v.name && v.name === 'Sin-Ji') ||
                                   voices.find(v => v.name && v.name.includes('Google') && (v.lang === 'yue' || v.lang === 'zh-HK')) ||
                                   voices.find(v => v.name && v.name.includes('Cantonese')) ||
                                   voices.find(v => v.lang === 'yue') ||
                                   voices.find(v => v.lang === 'zh-HK') ||
                                   voices.find(v => v.lang && v.lang.includes('hk')) ||
                                   null;
                        }

                        function speakCantoneseOnce(text, onEnd) {
                            if (!text || !text.trim()) { if (onEnd) onEnd(); return; }
                            try { window.speechSynthesis.cancel(); } catch(e) {}
                            const utterance = new SpeechSynthesisUtterance(text);
                            utterance.lang = "yue";
                            utterance.rate = 0.85;
                            utterance.pitch = 1.0;
                            utterance.volume = 1;
                            const voice = getCantoneseVoice();
                            if (voice) utterance.voice = voice;
                            let ended = false;
                            utterance.onend = () => { if (!ended) { ended = true; if (onEnd) onEnd(); } };
                            utterance.onerror = () => { if (!ended) { ended = true; if (onEnd) onEnd(); } };
                            try {
                                window.speechSynthesis.speak(utterance);
                            } catch(e) { if (onEnd) onEnd(); }
                        }

                        // 核心單句朗讀函數 (分段循序朗讀)
                        function speakSingleQuizItem(index, explanation, optA, optB, optC, onEnd) {
                            const parts = [
                                \`題號\${index + 1}。\${explanation}\`,
                                \`選項A：\${optA}\`,
                                \`選項B：\${optB}\`,
                                \`選項C：\${optC}\`
                            ];
                            let currentIndex = 0;
                            function speakNext() {
                                if (currentIndex >= parts.length) {
                                    if (onEnd) onEnd();
                                    return;
                                }
                                speakCantoneseOnce(parts[currentIndex], () => {
                                    currentIndex++;
                                    speakNext();
                                });
                            }
                            speakNext();
                        }

                        // 逐題朗讀狀態 (彈窗內獨立)
                        let quizItemReadingIndexLocal = null;
                        let isCantoneseReadingLocal = false;

                        function stopAllSpeechLocal() {
                            if (isCantoneseReadingLocal) {
                                try { window.speechSynthesis.cancel(); } catch(e) {}
                                isCantoneseReadingLocal = false;
                            }
                            quizItemReadingIndexLocal = null;
                        }

                        // 逐題朗讀 (無停止鍵版本)
                        function toggleSingleQuizReadingLocal(index, buttonElement) {
                            if (!window.quizData || index >= window.quizData.length) return;

                            if (quizItemReadingIndexLocal === index && isCantoneseReadingLocal) {
                                return;
                            }

                            if (isCantoneseReadingLocal) {
                                stopAllSpeechLocal();
                            }

                            const item = window.quizData[index];
                            const optA = item.options.find(o => o.letter === 'A');
                            const optB = item.options.find(o => o.letter === 'B');
                            const optC = item.options.find(o => o.letter === 'C');

                            quizItemReadingIndexLocal = index;
                            isCantoneseReadingLocal = true;

                            speakSingleQuizItem(index, item.explanation, optA ? optA.text : '', optB ? optB.text : '', optC ? optC
                                .text : '', () => {
                                    quizItemReadingIndexLocal = null;
                                    isCantoneseReadingLocal = false;
                                });
                        }

                        // 渲染選擇題表格 (彈窗內)
                        function renderQuizTableInPopup(quizItems) {
                            const container = document.getElementById('quizContainer');
                            if (!container) return;
                            if (!quizItems || quizItems.length === 0) {
                                container.innerHTML = '<p style="color:#b45f2b; text-align:center; padding:20px;">⚠️ 沒有生字資料，無法生成選擇題。</p>';
                                return;
                            }
                            let total = quizItems.length;
                            let answered = quizItems.filter(item => item.isAnswered).length;
                            let correctCount = quizItems.filter(item => item.isAnswered && item.userAnswer === item.correctLetter).length;
                            let accuracy = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;

                            let html = \`
                                <div class="quiz-stats">
                                    <span>📊 總題數：\${total}</span>
                                    <span>✅ 已答：\${answered}</span>
                                    <span>🎯 正確率：\${accuracy}%</span>
                                </div>
                                <table class="quiz-table">
                                    <thead>
                                        <tr>
                                            <th style="width:45px;">題號</th>
                                            <th>解釋</th>
                                            <th style="width:75px;">選項 A</th>
                                            <th style="width:75px;">選項 B</th>
                                            <th style="width:75px;">選項 C</th>
                                            <th style="width:105px;">你的答案</th>
                                            <th style="width:80px;">結果</th>
                                            <th style="width:45px;">朗讀</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                            \`;
                            for (let i = 0; i < quizItems.length; i++) {
                                const item = quizItems[i];
                                const options = item.options;
                                const optionA = options.find(o => o.letter === 'A');
                                const optionB = options.find(o => o.letter === 'B');
                                const optionC = options.find(o => o.letter === 'C');
                                let rowClass = '';
                                let resultDisplay = '';
                                if (item.isAnswered) {
                                    const isCorrect = item.userAnswer === item.correctLetter;
                                    if (isCorrect) {
                                        rowClass = 'correct';
                                        resultDisplay = '✅';
                                    } else {
                                        rowClass = 'wrong';
                                        resultDisplay = \`❌ (\${item.correctLetter})\`;
                                    }
                                }
                                html += \`
                                    <tr class="\${rowClass}" data-index="\${i}">
                                        <td style="text-align:center; font-weight:bold;">\${i + 1}</td>
                                        <td>\${item.explanation}</td>
                                        <td>\${optionA ? optionA.text : ''}</td>
                                        <td>\${optionB ? optionB.text : ''}</td>
                                        <td>\${optionC ? optionC.text : ''}</td>
                                        <td>
                                            <select class="quiz-select" data-index="\${i}">
                                                <option value="">請揀選</option>
                                                <option value="A" \${item.userAnswer === 'A' ? 'selected' : ''}>A</option>
                                                <option value="B" \${item.userAnswer === 'B' ? 'selected' : ''}>B</option>
                                                <option value="C" \${item.userAnswer === 'C' ? 'selected' : ''}>C</option>
                                            </select>
                                        </td>
                                        <td style="text-align:center; font-weight:bold;">\${resultDisplay}</td>
                                        <td style="text-align:center;">
                                            <button class="quiz-speak-btn" data-index="\${i}">🔊</button>
                                        </td>
                                    </tr>
                                \`;
                            }
                            html += \`
                                    </tbody>
                                </table>
                            \`;
                            container.innerHTML = html;

                            // 綁定下拉選單事件
                            document.querySelectorAll('.quiz-select').forEach(select => {
                                select.addEventListener('change', function(e) {
                                    const idx = parseInt(this.dataset.index, 10);
                                    const val = this.value;
                                    if (!val) return;
                                    if (window.quizData && window.quizData[idx]) {
                                        window.quizData[idx].userAnswer = val;
                                        window.quizData[idx].isAnswered = true;
                                    }
                                    renderQuizTableInPopup(window.quizData);
                                });
                            });

                            // 綁定逐題按鈕事件
                            document.querySelectorAll('.quiz-speak-btn').forEach(btn => {
                                const idx = parseInt(btn.dataset.index, 10);
                                btn.onclick = function() {
                                    toggleSingleQuizReadingLocal(idx, this);
                                };
                            });
                        }

                        // 切換模式
                        function switchPopupMode(mode) {
                            const listContainer = document.getElementById('wordListContainer');
                            const quizContainer = document.getElementById('quizContainer');
                            const quizTitle = document.getElementById('quizTitle');
                            const toggleBtn = document.getElementById('modeToggleBtn');
                            const toggleFooterBtn = document.getElementById('modeToggleFooterBtn');
                            if (mode === 'list') {
                                listContainer.style.display = 'block';
                                quizContainer.style.display = 'none';
                                if (quizTitle) quizTitle.textContent = '📚 生字列表';
                                if (toggleBtn) {
                                    toggleBtn.textContent = '📝 選擇題';
                                    toggleBtn.onclick = () => switchPopupMode('quiz');
                                }
                                if (toggleFooterBtn) {
                                    toggleFooterBtn.textContent = '📝 選擇題';
                                    toggleFooterBtn.onclick = () => switchPopupMode('quiz');
                                }
                                stopAllSpeechLocal();
                            } else {
                                listContainer.style.display = 'none';
                                quizContainer.style.display = 'block';
                                if (quizTitle) quizTitle.textContent = '📝 選擇題練習';
                                if (toggleBtn) {
                                    toggleBtn.textContent = '📋 返回列表';
                                    toggleBtn.onclick = () => switchPopupMode('list');
                                }
                                if (toggleFooterBtn) {
                                    toggleFooterBtn.textContent = '📋 返回列表';
                                    toggleFooterBtn.onclick = () => switchPopupMode('list');
                                }
                                // 重新生成選擇題
                                const source = (window.currentWordSet === "must") ? window.allMustWords : window.allOnlyWords;
                                const daySelect = parent.document.getElementById('daySelect');
                                const customNum = parent.document.getElementById('customDayNum');
                                let dayFilter = null;
                                if (daySelect) {
                                    if (daySelect.value === 'custom') {
                                        let val = customNum ? customNum.value.trim() : '';
                                        if (val && !isNaN(Number(val))) dayFilter = String(Number(val));
                                    }
                                }
                                let filtered = [];
                                if (!dayFilter || daySelect.value === 'all') {
                                    filtered = [...source];
                                } else {
                                    filtered = source.filter(w => String(w.day) === dayFilter);
                                }
                                window.quizData = generateQuizData(filtered);
                                renderQuizTableInPopup(window.quizData);
                                stopAllSpeechLocal();
                            }
                        }

                        function generateQuizData(wordList) {
                            if (!wordList || wordList.length === 0) return null;
                            const quizItems = [];
                            const total = wordList.length;
                            const allChars = wordList.map(w => w.character);
                            for (let i = 0; i < total; i++) {
                                const correct = wordList[i];
                                let distractors = [];
                                const candidates = allChars.filter(ch => ch !== correct.character);
                                if (candidates.length < 2) {
                                    while (distractors.length < 2) {
                                        distractors.push(candidates.length > 0 ? candidates[0] : correct.character);
                                    }
                                } else {
                                    const shuffled = [...candidates].sort(() => Math.random() - 0.5);
                                    distractors = shuffled.slice(0, 2);
                                }
                                const options = [
                                    { text: correct.character, isCorrect: true },
                                    { text: distractors[0], isCorrect: false },
                                    { text: distractors[1], isCorrect: false }
                                ];
                                const shuffledOptions = options.sort(() => Math.random() - 0.5);
                                let correctLetter = '';
                                const letters = ['A', 'B', 'C'];
                                for (let idx = 0; idx < shuffledOptions.length; idx++) {
                                    if (shuffledOptions[idx].isCorrect) {
                                        correctLetter = letters[idx];
                                        break;
                                    }
                                }
                                quizItems.push({
                                    index: i,
                                    explanation: correct.explanation || '',
                                    correctChar: correct.character,
                                    correctLetter: correctLetter,
                                    options: shuffledOptions.map((opt, idx) => ({
                                        letter: letters[idx],
                                        text: opt.text,
                                        isCorrect: opt.isCorrect
                                    })),
                                    userAnswer: null,
                                    isAnswered: false
                                });
                            }
                            return quizItems;
                        }

                        // 初始化
                        window.onload = function() {
                            if (!window.quizData) {
                                const source = (window.currentWordSet === "must") ? window.allMustWords : window.allOnlyWords;
                                const daySelect = parent.document.getElementById('daySelect');
                                const customNum = parent.document.getElementById('customDayNum');
                                let dayFilter = null;
                                if (daySelect) {
                                    if (daySelect.value === 'custom') {
                                        let val = customNum ? customNum.value.trim() : '';
                                        if (val && !isNaN(Number(val))) dayFilter = String(Number(val));
                                    }
                                }
                                let filtered = [];
                                if (!dayFilter || daySelect.value === 'all') {
                                    filtered = [...source];
                                } else {
                                    filtered = source.filter(w => String(w.day) === dayFilter);
                                }
                                window.quizData = generateQuizData(filtered);
                            }
                            document.getElementById('wordListContainer').style.display = 'block';
                            document.getElementById('quizContainer').style.display = 'none';
                            document.getElementById('modeToggleBtn').onclick = () => switchPopupMode('quiz');
                            document.getElementById('modeToggleFooterBtn').onclick = () => switchPopupMode('quiz');
                        };
                    <\/script>
                </body>
                </html>
            `;

            const win = window.open("", "_blank", "width=900,height=750,scrollbars=yes");
            if (win) {
                win.document.write(popupHtml);
                win.document.close();
            } else {
                alert("請允許彈出視窗，以查看完整生字表");
            }
        }

        // ====================== 保留原有函數 ======================
        function applyDayFilter() {
            if (!currentFileName) return;
            refreshWordList(currentWordSet);
        }

        function initDaySelectToggle() {
            const daySelect = document.getElementById("daySelect");
            const customInput = document.getElementById("customDayNum");
            daySelect.addEventListener("change", () => {
                if (daySelect.value === "custom") {
                    customInput.disabled = false;
                    customInput.value = "1";
                } else {
                    customInput.disabled = true;
                    customInput.value = "1";
                }
            });
            customInput.disabled = true;
            document.getElementById("filterDayBtn").addEventListener("click", applyDayFilter);
        }

        function bindWordEvents() {
            document.getElementById("toggleWordBtn").onclick = () => {
                if (!currentFilteredWords.length) return;
                isWordVisible = !isWordVisible;
                renderCurrentWord();
            };
            document.getElementById("readWordThreeBtn").onclick = () => {
                if (!currentFilteredWords.length) return;
                const w = currentFilteredWords[currentWordIndex];
                if (w && w.character) {
                    if (isCantoneseReading && currentCantoneseButton === document.getElementById("readWordThreeBtn")) {
                        stopAllSpeech();
                        return;
                    }
                    stopAllSpeech();
                    const btn = document.getElementById("readWordThreeBtn");
                    currentCantoneseButton = btn;
                    btn.textContent = "⏹️ 停止";
                    btn.classList.add('reading-disabled');
                    isCantoneseReading = true;
                    let times = 0;

                    function readNext() {
                        if (!isCantoneseReading) return;
                        if (times >= 3) {
                            btn.textContent = "🔊 生字x3";
                            btn.classList.remove('reading-disabled');
                            isCantoneseReading = false;
                            currentCantoneseButton = null;
                            return;
                        }
                        times++;
                        speakCantoneseOnce(w.character, () => {
                            if (isCantoneseReading && times < 3) {
                                setTimeout(readNext, 500);
                            } else if (times >= 3) {
                                btn.textContent = "🔊 生字x3";
                                btn.classList.remove('reading-disabled');
                                isCantoneseReading = false;
                                currentCantoneseButton = null;
                            }
                        });
                    }
                    ensureCantoneseEngine(readNext);
                }
            };
            document.getElementById("readMeaningBtn").onclick = () => {
                if (!currentFilteredWords.length) return;
                const w = currentFilteredWords[currentWordIndex];
                if (w && w.explanation) {
                    if (isCantoneseReading && currentCantoneseButton === document.getElementById("readMeaningBtn")) {
                        stopAllSpeech();
                        return;
                    }
                    stopAllSpeech();
                    const btn = document.getElementById("readMeaningBtn");
                    currentCantoneseButton = btn;
                    btn.textContent = "⏹️ 停止";
                    btn.classList.add('reading-disabled');
                    isCantoneseReading = true;
                    ensureCantoneseEngine(() => {
                        speakCantoneseOnce(w.explanation, () => {
                            btn.textContent = "🗣️ 解釋x1";
                            btn.classList.remove('reading-disabled');
                            isCantoneseReading = false;
                            currentCantoneseButton = null;
                        });
                    });
                }
            };
            document.getElementById("prevWordBtn").onclick = () => {
                if (currentWordIndex > 0) {
                    currentWordIndex--;
                    isWordVisible = false;
                    renderCurrentWord();
                    stopAllSpeech();
                }
            };
            document.getElementById("nextWordBtn").onclick = () => {
                if (currentWordIndex + 1 < currentFilteredWords.length) {
                    currentWordIndex++;
                    isWordVisible = false;
                    renderCurrentWord();
                    stopAllSpeech();
                } else if (currentWordIndex + 1 === currentFilteredWords.length) {
                    alert("🎉 已完成本組所有生字！好厲害～");
                }
            };
            document.getElementById("showAllWordsBtn").onclick = showAllWordsPopup;
        }

        function bindArticleEvents() {
            document.getElementById("prevArticleBtn").onclick = () => prevArticle();
            document.getElementById("nextArticleBtn").onclick = () => nextArticle();
            document.getElementById("readArticleBtn").onclick = () => readArticleOnce();
            document.getElementById("toggleArticleBtn").onclick = () => toggleArticleVisibility();
        }

        function bindTabSwitching() {
            document.querySelectorAll(".tab-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const tab = btn.getAttribute("data-tab");
                    if (tab === "must") {
                        switchWordSet("must");
                    } else if (tab === "only") {
                        switchWordSet("only");
                    } else if (tab === "article") {
                        document.getElementById("wordPanel").style.display = "none";
                        document.getElementById("articlePanel").style.display = "block";
                        stopAllSpeech();
                        if (articles.length) {
                            updateArticleNavButtons();
                            const art = articles[currentArticleIndex];
                            if (art && !isArticleHidden) {
                                document.getElementById("articleContentBox").innerHTML = art.content.replace(/\n/g,
                                    '<br>');
                            }
                        }
                        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
                        btn.classList.add("active");
                    }
                });
            });
        }

        function bindFileSelect() {
            document.getElementById("fileSelect").addEventListener("change", async (e) => {
                const filename = e.target.value;
                if (!filename) return;
                await loadExcelFile(filename);
                isWordVisible = false;
                if (currentWordSet !== "article") {
                    document.getElementById("wordPanel").style.display = "block";
                    document.getElementById("articlePanel").style.display = "none";
                    refreshWordList(currentWordSet);
                } else {
                    document.getElementById("wordPanel").style.display = "none";
                    document.getElementById("articlePanel").style.display = "block";
                    if (articles.length) {
                        updateArticleNavButtons();
                        showArticle(currentArticleIndex);
                    }
                }
            });
        }

        window.addEventListener("DOMContentLoaded", async () => {
            await loadFileList();
            bindFileSelect();
            bindWordEvents();
            bindArticleEvents();
            bindTabSwitching();
            initDaySelectToggle();
            document.getElementById("wordPanel").style.display = "block";
            document.getElementById("articlePanel").style.display = "none";
        });
    </script>
</body>
